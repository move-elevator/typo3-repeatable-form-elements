services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  TRITUM\RepeatableFormElements\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'
      - '../Classes/Event/*'

  TRITUM\RepeatableFormElements\EventListener\AdaptVariantConditionEventListener:
    tags:
      - name: event.listener
        identifier: 'repeatableFormElements/copyVariants/adaptCondition'
